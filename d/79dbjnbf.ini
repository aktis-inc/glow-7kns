promptInput = Ternyata begini rasanya
Menjadi sasaran amarah dalam lingkar keluarga.
Hancur, berserak, luluh oleh duka,
Terjebak dalam dilema yang membelenggu jiwa.

Perih membakar dalam batin,
Merintih di balik selimut kekecewaan.
Aku bersembunyi dalam senyum dan tawa,
Berpura-pura seolah segalanya baik-baik saja.

Kucoba menguatkan hati dan jiwa,
Meski teriakan ayah terus menggema.
Ingin rasanya mengakhiri segalanya,
Meninggalkan luka, perih, dan kecewa
