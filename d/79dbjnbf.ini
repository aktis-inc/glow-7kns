Andai bisa,
Aku hanya ingin berjalan
Membawa bahagia dan tenang sebagai penunjuk jalan.

Tak ingin menjadi seperti ini.
Namun mungkin inilah takdir dari-Nya:
Harus lebih dulu merasakan luka
Sebelum memahami makna setia dan bahagia.
